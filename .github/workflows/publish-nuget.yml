name: Publish NuGet packages

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Core.Packages.sln

      - name: Build and pack (version 1.0.${{ github.run_number }})
        run: |
          dotnet build Core.Packages.sln --configuration Release \
            -p:Version=1.0.${{ github.run_number }} \
            -p:PackageOutputPath=${{ github.workspace }}/nupkgs

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/yahyaerdoan/index.json" \
            --name github \
            --username yahyaerdoan \
            --password "${{ secrets.GH_PACKAGES_TOKEN }}" \
            --store-password-in-clear-text

      - name: Push packages to GitHub Packages
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key "${{ secrets.GH_PACKAGES_TOKEN }}" \
            --source "github" \
            --skip-duplicate
