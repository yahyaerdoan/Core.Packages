name: Publish NuGet packages

on:
  push:
    branches: [ master ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Core.Packages.sln

      - name: Build and pack (version 1.0.${{ github.run_number }})
        run: |
          dotnet build Core.Packages.sln --configuration Release \
            -p:Version=1.0.${{ github.run_number }} \
            -p:PackageOutputPath=${{ github.workspace }}/nupkgs

      - name: Check secret is populated (debug only, prints no secret value)
        env:
          TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo "Token length: ${#TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::GH_PACKAGES_TOKEN is empty or not set for this repo."
            exit 1
          fi

      - name: Push packages to GitHub Packages
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key "${{ secrets.GH_PACKAGES_TOKEN }}" \
            --source "https://nuget.pkg.github.com/yahyaerdoan/index.json" \
            --skip-duplicate
